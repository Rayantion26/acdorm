<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dormitory AC Monitor</title>
  
  <!-- Load React via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Load Babel to transpile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Load Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- The actual React App inside a Babel script -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline Icon Components (Replaces lucide-react dependencies) ---
    const IconWrapper = ({ children, className }) => (
      <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {children}
      </svg>
    );
    const Sun = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></IconWrapper>;
    const Moon = ({ className }) => <IconWrapper className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconWrapper>;
    const Building = ({ className }) => <IconWrapper className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></IconWrapper>;
    const Hash = ({ className }) => <IconWrapper className={className}><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/></IconWrapper>;
    const Loader2 = ({ className }) => <IconWrapper className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconWrapper>;
    const AlertCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconWrapper>;
    const Zap = ({ className }) => <IconWrapper className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconWrapper>;
    const Info = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></IconWrapper>;
    const ThermometerSnowflake = ({ className }) => <IconWrapper className={className}><path d="M2 12h10"/><path d="M9 4v16"/><path d="m3 9 3 3-3 3"/><path d="m12 6 3-3 3 3"/><path d="M21 12h-4"/><path d="m15 15 3 3 3-3"/></IconWrapper>;
    const Globe = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></IconWrapper>;
    const ExternalLink = ({ className }) => <IconWrapper className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></IconWrapper>;
    const FileText = ({ className }) => <IconWrapper className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></IconWrapper>;
    const Activity = ({ className }) => <IconWrapper className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></IconWrapper>;

    // --- Translations Dictionary ---
    const translations = {
      en: {
        title: "AC Status Portal",
        campusBadge: "Jieren Campus Only",
        subtitle: "Monitor dormitory air conditioning credits instantly.",
        dormTypeLabel: "Dormitory Type",
        maleDorm: "Male Dorm",
        femaleDorm: "Female Dorm",
        roomNumLabel: "Room Number",
        placeholder: "e.g. A201",
        valid: "Valid",
        invalid: "Invalid",
        btnCheck: "Check AC Credits",
        btnConnecting: "Connecting...",
        creditsLeft: "AC Credits Left",
        room: "Room",
        currency: "元",
        sysResponse: "System Response",
        errProxy: "Cannot connect to the server. The school's firewall might be blocking external proxies, or the server is offline.",
        errFetch: "Failed to fetch data. Please check your connection.",
        tcuSystem: "TCU System",
        lateForm: "Late Arrive Form",
        statsTitle: "Live Usage Stats",
        statsTotal: "Total",
        statsMonthly: "This Month",
        statsLastWeek: "Last Week",
        statsToday: "Today"
      },
      zh: {
        title: "冷氣餘額查詢",
        campusBadge: "限介仁校區",
        subtitle: "即時監控宿舍冷氣電費餘額。",
        dormTypeLabel: "宿舍類型",
        maleDorm: "男生宿舍",
        femaleDorm: "女生宿舍",
        roomNumLabel: "房間號碼",
        placeholder: "例如: A201",
        valid: "格式正確",
        invalid: "格式錯誤",
        btnCheck: "查詢冷氣餘額",
        btnConnecting: "連線中...",
        creditsLeft: "冷氣剩餘金額",
        room: "房號",
        currency: "元",
        sysResponse: "系統原始回應",
        errProxy: "無法連線至伺服器。學校防火牆可能阻擋了外部連線，或是伺服器目前離線中。",
        errFetch: "獲取資料失敗，請檢查您的網路連線狀態。",
        tcuSystem: "TCU 校務系統",
        lateForm: "晚歸請假表單",
        statsTitle: "即時查詢統計",
        statsTotal: "總計",
        statsMonthly: "本月",
        statsLastWeek: "上週",
        statsToday: "今日"
      }
    };

    function App() {
      const [roomID, setRoomID] = useState('');
      const [dormType, setDormType] = useState('1'); // '1' for Male, '0' for Female
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [isValid, setIsValid] = useState(false);
      const [isDark, setIsDark] = useState(true); // Dark theme default
      const [lang, setLang] = useState('en'); // Language state
      
      const [fetchedDormType, setFetchedDormType] = useState(null);
      const [fetchedRoomID, setFetchedRoomID] = useState(null);
      const [stats, setStats] = useState(null);

      const t = translations[lang]; // Active translation

      // Fetch and Increment Stats
      useEffect(() => {
        const fetchStats = async () => {
          const targetUrl = 'https://acdorm.pres26aaron.workers.dev/';
          const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
          
          // 1. The "Ping" (POST) - Trigger the Worker's Increment Logic
          // We send a simple POST with no headers to avoid strict CORS preflight blocks
          try {
            const postRes = await fetch(targetUrl, { method: 'POST' });
            if (!postRes.ok) throw new Error("Direct ping failed");
          } catch (err) {
            // Fallback: If blocked, try to send the ping through the proxy
            try {
              await fetch(proxyUrl, { method: 'POST' });
            } catch (proxyErr) {
              console.warn("Ping failed via proxy too.");
            }
          }

          // 2. The "Pull" (GET) - Retrieve freshly updated JSON data
          try {
            const res = await fetch(targetUrl);
            if (res.ok) {
              const data = await res.json();
              setStats(data);
            } else {
              throw new Error("Direct fetch blocked by CORS");
            }
          } catch (err) {
            // CORS Fallback for GET request
            try {
              const proxyRes = await fetch(proxyUrl);
              if (proxyRes.ok) {
                const data = await proxyRes.json();
                setStats(data);
              }
            } catch (proxyErr) {
              console.warn("Stats fetch skipped: Environment prevents connection.");
            }
          }
        };

        fetchStats();
      }, []);

      // Validate Room ID (e.g., A201: 1 Letter, 3 Digits)
      useEffect(() => {
        const regex = /^[a-zA-Z]\d{3}$/;
        setIsValid(regex.test(roomID));
      }, [roomID]);

      const handleCheck = async (e) => {
        e.preventDefault();
        if (!isValid) return;

        setLoading(true);
        setError(null);
        setResult(null);

        try {
          const formattedRoomID = roomID.toUpperCase();
          // Target API URL
          const targetUrl = `http://203.72.75.10:808/Dormitory/GetRoomInfoByID?ID=${formattedRoomID}&SEX=${dormType}`;
          
          const proxies = [
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`
          ];

          let success = false;
          let textData = "";

          for (const proxyUrl of proxies) {
            try {
              const response = await fetch(proxyUrl);
              if (response.ok) {
                textData = await response.text();
                if (textData && textData.includes('剩餘金額')) {
                  success = true;
                  break;
                }
              }
            } catch (err) {
              console.warn("Proxy failed:", proxyUrl);
            }
          }

          if (!success) {
            throw new Error(t.errProxy);
          }

          const match = textData.match(/[\d.]+/);
          setResult({
            credits: match ? match[0] : '0.00'
          });
          setFetchedDormType(dormType);
          setFetchedRoomID(formattedRoomID);

        } catch (err) {
          setError(err.message || t.errFetch);
        } finally {
          setLoading(false);
        }
      };

      const toggleLanguage = () => {
        setLang(lang === 'en' ? 'zh' : 'en');
      };

      // Helper function to safely extract stats regardless of capitalization
      const getStatValue = (keyLower, keyUpper, keySpaced) => {
        if (!stats) return '-';
        if (stats[keyLower] !== undefined && stats[keyLower] !== null) return stats[keyLower];
        if (stats[keyUpper] !== undefined && stats[keyUpper] !== null) return stats[keyUpper];
        if (keySpaced && stats[keySpaced] !== undefined && stats[keySpaced] !== null) return stats[keySpaced];
        return '-';
      };

      return (
        <div className={isDark ? 'dark' : ''}>
          <div className="min-h-screen bg-gray-50 dark:bg-[#0f172a] text-gray-900 dark:text-gray-100 font-sans flex flex-col items-center justify-center p-4 sm:p-8 transition-colors duration-300 relative overflow-hidden">
            
            <main className="w-full max-w-5xl z-10 flex flex-col items-center">
              
              {/* Header */}
              <div className="text-center mb-8 space-y-3 animate-in fade-in duration-500 w-full flex flex-col items-center">
                <div className="inline-flex items-center justify-center p-4 bg-blue-100 dark:bg-blue-900/30 rounded-2xl mb-2 text-blue-600 dark:text-blue-400">
                  <ThermometerSnowflake className="w-8 h-8" />
                </div>
                <h1 className="text-3xl font-bold tracking-tight">
                  {t.title}
                </h1>
                <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold tracking-wide bg-indigo-100 text-indigo-800 dark:bg-indigo-900/40 dark:text-indigo-300 border border-indigo-200 dark:border-indigo-800/50">
                  {t.campusBadge}
                </span>
                <p className="text-gray-500 dark:text-gray-400 text-sm mt-2">
                  {t.subtitle}
                </p>
              </div>

              {/* Main Two-Column Layout Container */}
              <div className="w-full flex flex-col lg:flex-row gap-6 justify-center items-start">
                
                {/* Left Column: Form Card */}
                <div className="w-full lg:w-[480px] bg-white dark:bg-[#1e293b] border border-gray-200 dark:border-gray-700/50 rounded-3xl p-6 shadow-xl transition-colors duration-300 relative z-20 shrink-0">
                  
                  {/* Utility Buttons Row */}
                  <div className="flex flex-wrap items-center gap-2 mb-6 pb-6 border-b border-gray-100 dark:border-gray-700/50">
                    <button
                      type="button"
                      onClick={toggleLanguage}
                      className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-gray-100 dark:bg-gray-800/50 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all border border-gray-200 dark:border-gray-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      aria-label="Toggle Language"
                    >
                      <Globe className="w-4 h-4" />
                      <span className="text-sm font-bold tracking-wide">{lang === 'en' ? '中' : 'EN'}</span>
                    </button>
                    <button
                      type="button"
                      onClick={() => setIsDark(!isDark)}
                      className="p-2 rounded-xl bg-gray-100 dark:bg-gray-800/50 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all border border-gray-200 dark:border-gray-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      aria-label="Toggle Dark Mode"
                    >
                      {isDark ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
                    </button>
                    <a
                      href="https://admin.tcu.edu.tw/TCUstweb/stlogin.php"
                      target="_blank"
                      rel="noopener noreferrer"
                      className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-gray-100 dark:bg-gray-800/50 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all border border-gray-200 dark:border-gray-700/50 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                      <ExternalLink className="w-4 h-4" />
                      {t.tcuSystem}
                    </a>
                    <a
                      href="https://docs.google.com/forms/d/e/1FAIpQLScpNFWH5ujRJ2EnpDQ8fE3fGerV-WDwul4ZOe2Z5Dg2AeSehw/viewform?usp=dialog"
                      target="_blank"
                      rel="noopener noreferrer"
                      className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/40 transition-all border border-blue-200 dark:border-blue-800/50 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                      <FileText className="w-4 h-4" />
                      {t.lateForm}
                    </a>
                  </div>

                  <form onSubmit={handleCheck} className="space-y-6">
                    
                    {/* Gender Selection */}
                    <div className="space-y-3">
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
                        <Building className="w-4 h-4 text-blue-500" />
                        {t.dormTypeLabel}
                      </label>
                      <div className="flex bg-gray-100 dark:bg-gray-900/50 p-1.5 rounded-xl border border-gray-200 dark:border-gray-700/50">
                        <button
                          type="button"
                          onClick={() => setDormType('1')}
                          className={`flex-1 flex justify-center items-center py-2.5 text-sm font-medium rounded-lg transition-all duration-200 ${
                            dormType === '1'
                              ? 'bg-white dark:bg-[#1e293b] text-blue-600 dark:text-blue-400 shadow-sm border border-gray-200 dark:border-gray-700'
                              : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'
                          }`}
                        >
                          {t.maleDorm}
                        </button>
                        <button
                          type="button"
                          onClick={() => setDormType('0')}
                          className={`flex-1 flex justify-center items-center py-2.5 text-sm font-medium rounded-lg transition-all duration-200 ${
                            dormType === '0'
                              ? 'bg-white dark:bg-[#1e293b] text-pink-600 dark:text-pink-400 shadow-sm border border-gray-200 dark:border-gray-700'
                              : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200'
                          }`}
                        >
                          {t.femaleDorm}
                        </button>
                      </div>
                    </div>

                    {/* Room ID Input */}
                    <div className="space-y-3">
                      <label className="text-sm font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2" htmlFor="roomID">
                        <Hash className="w-4 h-4 text-blue-500" />
                        {t.roomNumLabel}
                      </label>
                      <div className="relative">
                        <input
                          id="roomID"
                          type="text"
                          placeholder={t.placeholder}
                          maxLength={4}
                          value={roomID}
                          onChange={(e) => setRoomID(e.target.value.toUpperCase())}
                          className="w-full bg-gray-50 dark:bg-gray-900/50 border border-gray-300 dark:border-gray-700/50 text-gray-900 dark:text-white rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all font-mono uppercase text-lg tracking-wider placeholder:text-gray-400 dark:placeholder:text-gray-600"
                        />
                        {roomID.length > 0 && (
                          <div className="absolute right-3 top-1/2 -translate-y-1/2 flex items-center">
                            {isValid ? (
                              <span className="text-xs font-semibold bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 px-2 py-1 rounded-md">
                                {t.valid}
                              </span>
                            ) : (
                              <span className="text-xs font-semibold bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 px-2 py-1 rounded-md">
                                {t.invalid}
                              </span>
                            )}
                          </div>
                        )}
                      </div>
                    </div>

                    {/* Submit Button */}
                    <button
                      type="submit"
                      disabled={!isValid || loading}
                      className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800"
                    >
                      {loading ? (
                        <React.Fragment>
                          <Loader2 className="w-5 h-5 animate-spin" />
                          {t.btnConnecting}
                        </React.Fragment>
                      ) : (
                        t.btnCheck
                      )}
                    </button>

                    {/* Error Message */}
                    {error && (
                      <div className="p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800/50 rounded-xl flex items-start gap-3">
                        <AlertCircle className="w-5 h-5 text-red-500 dark:text-red-400 shrink-0 mt-0.5" />
                        <p className="text-sm text-red-700 dark:text-red-300 leading-relaxed">{error}</p>
                      </div>
                    )}
                  </form>
                </div>

                {/* Right Column: Results & Live Stats */}
                <div className="w-full lg:w-[480px] flex flex-col gap-6 shrink-0">
                  
                  {/* Results Card */}
                  {result && !loading && !error && dormType === fetchedDormType && roomID.toUpperCase() === fetchedRoomID && (
                    <div className="bg-white dark:bg-[#1e293b] border border-gray-200 dark:border-gray-700/50 rounded-3xl p-6 sm:p-8 shadow-xl animate-[fadeIn_0.5s_ease-out] transition-colors relative z-20">
                      <div className="flex flex-col items-center justify-center text-center space-y-2">
                        <div className="p-2 bg-blue-100 dark:bg-blue-900/30 rounded-full mb-2">
                          <Zap className="w-6 h-6 text-blue-600 dark:text-blue-400" />
                        </div>
                        <p className="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest">
                          {t.creditsLeft}
                        </p>
                        
                        {/* Massive Credits Display */}
                        <div className="flex items-baseline justify-center gap-2 mb-2">
                          <div className="text-5xl sm:text-6xl font-black text-gray-900 dark:text-white tracking-tight">
                            {result.credits}
                          </div>
                          <span className="text-2xl font-bold text-gray-400 dark:text-gray-500">{t.currency}</span>
                        </div>
                        <p className="text-blue-600 dark:text-blue-400 text-sm font-medium">
                          {fetchedDormType === '1' ? t.maleDorm : t.femaleDorm} {t.room} {fetchedRoomID}
                        </p>
                      </div>
                    </div>
                  )}

                  {/* Live Stats Card */}
                  <div className="bg-white/60 dark:bg-[#1e293b]/80 border border-gray-200 dark:border-gray-700/50 rounded-3xl p-5 shadow-sm backdrop-blur-sm transition-colors relative z-20">
                    <div className="flex items-center gap-2 mb-3 justify-center">
                      <Activity className="w-4 h-4 text-gray-400" />
                      <h3 className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">{t.statsTitle}</h3>
                    </div>
                    
                    <div className="flex justify-between items-center divide-x divide-gray-200 dark:divide-gray-700/50">
                      {/* Using the getStatValue helper to ensure data appears regardless of capitalization */}
                      <div className="flex flex-col items-center flex-1 px-1">
                        <span className="text-[10px] sm:text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">{t.statsToday}</span>
                        <span className="text-base sm:text-lg font-bold text-gray-900 dark:text-white">
                          {getStatValue('today', 'Today')}
                        </span>
                      </div>
                      <div className="flex flex-col items-center flex-1 px-1">
                        <span className="text-[10px] sm:text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">{t.statsLastWeek}</span>
                        <span className="text-base sm:text-lg font-bold text-gray-900 dark:text-white">
                          {getStatValue('lastWeek', 'LastWeek', 'Last Week')}
                        </span>
                      </div>
                      <div className="flex flex-col items-center flex-1 px-1">
                        <span className="text-[10px] sm:text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">{t.statsMonthly}</span>
                        <span className="text-base sm:text-lg font-bold text-gray-900 dark:text-white">
                          {getStatValue('monthly', 'Monthly', 'This Month')}
                        </span>
                      </div>
                      <div className="flex flex-col items-center flex-1 px-1">
                        <span className="text-[10px] sm:text-xs font-medium text-gray-500 dark:text-gray-400 mb-0.5">{t.statsTotal}</span>
                        <span className="text-base sm:text-lg font-bold text-blue-600 dark:text-blue-400">
                          {getStatValue('total', 'Total')}
                        </span>
                      </div>
                    </div>

                  </div>

                </div>
              </div>
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
